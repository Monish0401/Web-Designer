name: React CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    # Set the working directory to the 'web-designer' folder 
    # where your package.json is located.
    defaults:
      run:
        working-directory: web-designer

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # Path to lock file for caching
          cache-dependency-path: web-designer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          CI: true

      - name: Run tests
        # Runs the test script defined in your package.json
        run: npm test -- --watchAll=false
        env:
          CI: true