name: React CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # If your package.json is inside a subfolder (like 'web-designer'), 
    # use the 'defaults' setting below. Otherwise, remove it.
    defaults:
      run:
        working-directory: ./web-designer

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # Point to the lock file for caching
          cache-dependency-path: ./web-designer/package-lock.json

      - name: Change the directory
        run: cd ./web-designer/

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          # This ensures warnings are treated as errors in CI
          CI: true

      - name: Run tests
        run: npm test -- --watchAll=false
        env:
          CI: true